schema-version = "1.12.0"

[install]
adl.flake = "github:inference-gateway/adl-cli/v0.39.3"
go.pkg-path = "go"
go.version = "1.26.2"

golangci-lint.pkg-path = "golangci-lint"
golangci-lint.version = "^2.12.2"
golangci-lint.pkg-group = "common"

go-task.pkg-path = "go-task"
go-task.version = "^3.48.0"
go-task.pkg-group = "common"

git.pkg-path = "git"
git.version = "^2.53.0"
git.pkg-group = "common"

docker.pkg-path = "docker"
docker.version = "^29.5.1"
docker.pkg-group = "common"

claude-code.pkg-path = "claude-code"
claude-code.version = "^2.1.148"
claude-code.pkg-group = "common"

# Extra packages declared in spec.development.deps. Each entry is rendered
# as a Flox install line resolved against Nixpkgs. The package name from
# the ADL ('<package>@<version>') becomes the Nixpkgs attribute path; if a
# package is exposed under a different attribute path in Nixpkgs you may
# need to add it under .adl-ignore and hand-author the override.
deno.pkg-path = "deno"
deno.version = "^2.7.14"

[hook]
on-activate = '''
  echo "🌟 Welcome to n8n-agent development environment!"
  echo "Go version: $(go version)"
'''
