apiVersion: adl.inference-gateway.com/v1
kind: Agent
metadata:
  name: n8n-agent
  description:
    A2A agent server specialized in generating and automating n8n workflows
  version: 0.3.0
spec:
  capabilities:
    streaming: true
    pushNotifications: false
    stateTransitionHistory: false
  config:
    tools:
      read:
        enabled: true
  agent:
    provider: ""
    model: ""
    systemPrompt: |
      You are an expert N8N workflow automation assistant. Your role is to help users build powerful automation workflows using N8N.

      Your primary capabilities:
      1. **Documentation Search**: Use the search_n8n_docs tool to search through comprehensive N8N node documentation to find the right nodes for any task
      2. **Workflow Generation**: Create complete, working N8N workflow YAML files based on user requirements using your knowledge and the create_artifact tool
      3. **Workflow Validation**: Use the validate_n8n_workflow tool to ensure all workflows are valid before creating artifacts

      Key knowledge areas:
      - 520+ N8N nodes including standard nodes and LangChain AI nodes
      - Best practices for workflow design and node configuration
      - Integration patterns for popular services (Slack, Gmail, databases, APIs, etc.)
      - Trigger types and when to use them (webhooks, schedules, manual triggers)
      - Data transformation and flow control
      - Error handling and workflow optimization

      When helping users:
      - Always search documentation first to ensure accurate node usage
      - Provide complete, working YAML configurations
      - Include proper parameter configurations with examples
      - Suggest best practices for workflow organization
      - Consider error handling and edge cases
      - Explain the workflow logic clearly

      Your responses should be practical, accurate, and ready-to-use. Your automation solutions should be maintainable, efficient, and production-ready.

      When a user requests a new workflow or asks to automate a process, follow the
      n8n-workflow-generation skill - load skills/n8n-workflow-generation/SKILL.md
      via the read tool and execute its steps exactly.

      Before saving any workflow with create_artifact you MUST validate it by
      following the n8n-workflow-validation skill - load
      skills/n8n-workflow-validation/SKILL.md via the read tool. Call
      validate_n8n_workflow, fix every reported error, and re-validate until the
      result is VALID. Never create an artifact from an unvalidated or invalid
      workflow, and only consider the task complete once validation passes.
  tools:
    - id: read
    - id: search_n8n_docs
      name: search_n8n_docs
      description:
        Search through N8N node documentation to find relevant information about
        specific nodes, their parameters, and usage patterns
      tags:
        - documentation
        - search
        - n8n
      schema:
        type: object
        properties:
          query:
            type: string
            description:
              Search query to find relevant N8N nodes or documentation
          node_type:
            type: string
            description:
              Optional filter by specific node type (e.g., "webhook", "http",
              "database")
          category:
            type: string
            description:
              Optional filter by category (e.g., "trigger", "action",
              "langchain")
        required:
          - query
      inject:
        - logger
    - id: validate_n8n_workflow
      name: validate_n8n_workflow
      description:
        Validate N8N workflow YAML/JSON to ensure it follows the correct schema
        and has all required attributes before creating artifacts
      tags:
        - validation
        - workflow
        - n8n
        - yaml
        - json
      schema:
        type: object
        properties:
          workflow_content:
            type: string
            description:
              The complete N8N workflow content to validate (YAML or JSON
              format)
          format:
            type: string
            enum:
              - yaml
              - json
              - auto
            description:
              The format of the workflow content (auto-detect if not specified)
            default: "auto"
        required:
          - workflow_content
      inject:
        - logger
  skills:
    - id: n8n-workflow-generation
      bare: true
      name: n8n-workflow-generation
      description:
        "Use this when the user requests a new n8n workflow or asks to automate
        a process. Searches relevant nodes with search_n8n_docs, drafts the
        workflow YAML, validates it with validate_n8n_workflow, then saves it
        via create_artifact."
      tags:
        - n8n
        - workflow
        - automation
    - id: n8n-workflow-validation
      bare: true
      name: n8n-workflow-validation
      description:
        "Use this to validate an n8n workflow before saving it as an artifact,
        or whenever a user asks to check, lint, or validate an existing
        workflow. Runs validate_n8n_workflow, fixes every reported error, and
        re-validates until the workflow is VALID. Validation is mandatory before
        create_artifact."
      tags:
        - n8n
        - workflow
        - validation
        - yaml
        - json
  examples:
    - title: Generate a workflow from a plain-English request
      description: >-
        Ask for "a workflow that posts new Airtable records to a Slack channel"
        and the agent searches the relevant n8n nodes with search_n8n_docs,
        drafts the workflow YAML, validates it with validate_n8n_workflow, and
        returns it as a downloadable artifact ready to import into n8n.
    - title: Look up n8n node documentation
      description: >-
        Ask "which parameters does the HTTP Request node take?" and the agent
        uses search_n8n_docs to query its 520+ node documentation set (standard
        and LangChain AI nodes), answering with accurate node types, categories,
        and parameters.
    - title: Validate an existing workflow
      description: >-
        Paste an n8n workflow in YAML or JSON and the agent runs
        validate_n8n_workflow to check it against the schema, confirm required
        attributes, and report errors and warnings before you import it.
    - title: Scaffold a scheduled automation
      description: >-
        Describe a trigger plus actions - for example "every morning fetch new
        RSS items and email a digest" - and the agent selects an appropriate
        trigger node, wires the actions and connections, and produces a
        ready-to-run workflow with follow-up configuration notes.
  documentation:
    pages:
      - title: Setup
        path: docs/setup.md
        description:
          Install, build, and run the n8n-agent locally or with Docker.
      - title: Configuration
        path: docs/configuration.md
        description:
          Environment variables for the LLM provider, artifacts, and tools.
      - title: Usage
        path: docs/usage.md
        description:
          Submit tasks, generate and validate n8n workflows, and collect
          artifacts.
  server:
    port: 8080
    debug: false
    scheme: http
  language:
    go:
      module: github.com/inference-gateway/n8n-agent
      version: "1.26.4"
      vendor:
        deps: []
        devdeps: []
  acronyms:
    - n8n
  scm:
    provider: github
    url: https://github.com/inference-gateway/n8n-agent
    github_app: true
    issue_templates: false
    dependabot: true
    ci: true
    cd: true
    app_id_secret: RELEASER_APP_ID
    app_private_key_secret: RELEASER_APP_PRIVATE_KEY
  telemetry:
    enabled: true
    metrics:
      exporter:
        prometheus:
          host: ""
          port: 9464
  artifacts:
    enabled: true
  development:
    sandbox:
      flox:
        enabled: true
      devcontainer:
        enabled: false
      dockerCompose:
        enabled: false
    ai:
      orchestrators:
        claudecode:
          enabled: true
          appIdSecret: CLAUDE_APP_ID
          appPrivateKeySecret: CLAUDE_APP_PRIVATE_KEY
        infer:
          enabled: true
          appIdSecret: INFER_APP_ID
          appPrivateKeySecret: INFER_APP_PRIVATE_KEY
        codex:
          enabled: false
        gemini:
          enabled: false
        opencode:
          enabled: false
    deps:
      - deno@^2.7.14
